<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SlideX</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:#f4f6fb;
}

header{
background:linear-gradient(135deg,#1e3a8a,#3b82f6);
color:white;
padding:20px 40px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:22px;
font-weight:600;
}

.container{
max-width:1100px;
margin:auto;
padding:70px 20px;
text-align:center;
}

.container h1{
margin-bottom:10px;
}

.container p{
color:#666;
margin-bottom:50px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:30px;
}

.card{
background:white;
padding:35px;
border-radius:14px;
text-decoration:none;
color:#222;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
transition:0.25s;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 15px 35px rgba(0,0,0,0.15);
}

.icon{
width:60px;
height:60px;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
margin:auto;
margin-bottom:15px;
color:white;
}

/* Subject colors */

.security{
background:#3b82f6;
}

.rdbms{
background:#10b981;
}

.prompt{
background:#8b5cf6;
}

footer{
text-align:center;
padding:25px;
color:#777;
font-size:13px;
margin-top:40px;
}

</style>

</head>

<body>

<header>

<div class="logo">SlideX</div>

<div>B.Tech CSE PPT Portal</div>

</header>

<div class="container">

<h1>Presentation Library</h1>
<p>Select a subject to open the PPT folder</p>

<div class="grid">

<a class="card" href="https://drive.google.com/drive/folders/1sXfSAtr9VupHt7wcbvG5HKrakm2AnsYO" target="_blank">

<div class="icon security">
<i class="fas fa-shield-alt"></i>
</div>

<h3>Information Security</h3>

</a>

<a class="card" href="https://drive.google.com/drive/folders/1sXfSAtr9VupHt7wcbvV5HKrakm2AnsYO" target="_blank">

<div class="icon rdbms">
<i class="fas fa-database"></i>
</div>

<h3>RDBMS</h3>

</a>

<a class="card" href="https://drive.google.com/drive/folders/1sXfSAtr9VupHt7wcbvG5HKrakm2AnsYO" target="_blank">

<div class="icon prompt">
<i class="fas fa-robot"></i>
</div>

<h3>Prompt Engineering</h3>

</a>

</div>

</div>

<footer>
SlideX • Smart Classroom Slides
</footer>

</body>
</html>
